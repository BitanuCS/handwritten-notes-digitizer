<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    @page { size: A4; margin: 0; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; }

    .page {
      position: relative;
      width: 210mm;
      height: 297mm;
      background: #141414;
      color: #f2f2f2;
      overflow: hidden;
      page-break-after: always;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }

    .block {
      position: absolute;
      font-size: 10pt;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .block-equation {
      font-family: "Courier New", Courier, monospace;
      font-style: italic;
      color: #a8d8ea;
    }

    .date {
      position: absolute;
      top: 10mm;
      right: 12mm;
      font-size: 9pt;
      color: #888;
      font-style: italic;
    }
  </style>
</head>
<body>
  {% for page in pages %}
  <div class="page">
    {% if page.date %}<div class="date">{{ page.date }}</div>{% endif %}
    {% for block in page.blocks %}
      {% if block.type != 'diagram' and block.text %}
      <div
        class="block{% if block.type == 'equation' %} block-equation{% endif %}"
        style="left: {{ (block.box.x * 100) | round(2) }}%; top: {{ (block.box.y * 100) | round(2) }}%; width: {{ (block.box.w * 100) | round(2) }}%;"
      >{{ block.text }}</div>
      {% endif %}
    {% endfor %}
  </div>
  {% endfor %}
</body>
</html>
