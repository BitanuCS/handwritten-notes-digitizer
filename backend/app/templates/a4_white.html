<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <style>
    @page { size: A4; margin: 20mm 18mm; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      font-size: 11pt;
      line-height: 1.5;
      color: #1a1a1a;
    }

    .page {
      background: #ffffff;
      page-break-after: always;
    }

    .block {
      white-space: pre-wrap;
      word-break: break-word;
    }

    .block-equation {
      font-family: "Courier New", Courier, monospace;
      font-style: italic;
      text-align: center;
    }

    .date {
      text-align: right;
      font-size: 9pt;
      color: #666;
      font-style: italic;
      margin-bottom: 0.8em;
    }
  </style>
</head>
<body>
  {% for i in range(pages|length) %}
  <div class="page">
    {% if pages[i].date %}<div class="date">{{ pages[i].date }}</div>{% endif %}
    {% for item in flow_pages[i] %}
    {% if item.svg %}
    <div style="margin-top: {{ '%.2f'|format(item.gap_em) }}em;">{{ item.svg | safe }}</div>
    {% else %}
    <div
      class="block{% if item.block_type == 'equation' %} block-equation{% endif %}"
      style="margin-top: {{ '%.2f'|format(item.gap_em) }}em;{% if item.color %} color: {{ item.color }};{% endif %}"
    >{{ item.text }}</div>
    {% endif %}
    {% endfor %}
  </div>
  {% endfor %}
  <script>
    renderMathInElement(document.body, {
      delimiters: [
        {left: "$$", right: "$$", display: true},
        {left: "$",  right: "$",  display: false}
      ],
      throwOnError: false
    });
  </script>
</body>
</html>
