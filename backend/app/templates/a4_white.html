<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
  <style>
    @page { size: A4; margin: 0; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Helvetica Neue", Arial, sans-serif; }

    .page {
      position: relative;
      width: 210mm;
      height: 297mm;
      background: #ffffff;
      color: #1a1a1a;
      overflow: hidden;
      page-break-after: always;
    }

    .block {
      position: absolute;
      font-size: 10pt;
      line-height: 1.4;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .block-equation {
      font-family: "Courier New", Courier, monospace;
      font-style: italic;
    }

    .date {
      position: absolute;
      top: 10mm;
      right: 12mm;
      font-size: 9pt;
      color: #666;
      font-style: italic;
    }
  </style>
</head>
<body>
  {% for page in pages %}
  <div class="page">
    {% if page.date %}<div class="date">{{ page.date }}</div>{% endif %}
    {% for block in page.blocks %}
      {% if block.type != 'diagram' and block.text %}
      <div
        class="block{% if block.type == 'equation' %} block-equation{% endif %}"
        style="left: {{ (block.box.x * 100) | round(2) }}%; top: {{ (block.box.y * 100) | round(2) }}%; width: {{ (block.box.w * 100) | round(2) }}%;"
      >{{ block.text }}</div>
      {% endif %}
    {% endfor %}
  </div>
  {% endfor %}
  <script>
    renderMathInElement(document.body, {
      delimiters: [
        {left: "$$", right: "$$", display: true},
        {left: "$",  right: "$",  display: false}
      ],
      throwOnError: false
    });
  </script>
</body>
</html>
